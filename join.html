<section class="join-section">

<div class="join-container">

<h1>Create Your Free Account</h1>

<p>
Join thousands of genuine singles looking for friendship, dating and serious relationships.
</p>

<form>

<div class="input-box">

<label>Full Name</label>

<input type="text" placeholder="Enter your full name" required>

</div>

<div class="input-box">

<label>Age</label>

<input type="number" min="18" placeholder="18+" required>

</div>

<div class="input-box">

<label>Gender</label>

<select required>

<option value="">Select Gender</option>

<option>Male</option>

<option>Female</option>

<option>Other</option>

</select>

</div>

<div class="input-box">

<label>Looking For</label>

<select required>

<option value="">Choose</option>

<option>Friendship</option>

<option>Dating</option>

<option>Long-term Relationship</option>

<option>Marriage</option>

</select>

</div>

<div class="input-box">

<label>Location</label>

<input type="text" placeholder="e.g. Kericho">

</div>

<div class="input-box">

<label>Email Address</label>

<input type="email" placeholder="Enter email">

</div>

<div class="input-box">

<label>Phone Number</label>

<input type="tel" placeholder="+254...">

</div>

<div class="input-box">

<label>Upload Profile Photo</label>

<input type="file" accept="image/*">

</div>
